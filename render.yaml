services:
  - type: web
    name: trivia-platform
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: trivia-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
